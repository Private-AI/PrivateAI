name: Railway Ready CI

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - feat/github-actions-docker
  pull_request:

jobs:
  frontend-image:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set image names
        run: |
          OWNER_LOWER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "FRONTEND_IMAGE=ghcr.io/$OWNER_LOWER/privateai-frontend" >> "$GITHUB_ENV"

      - name: Set image tags
        run: |
          if [ "${{ github.ref_name }}" = "master" ]; then
            echo "PRIMARY_TAG=latest" >> "$GITHUB_ENV"
          else
            BRANCH_TAG="$(echo '${{ github.ref_name }}' | tr '/' '-')"
            echo "PRIMARY_TAG=$BRANCH_TAG" >> "$GITHUB_ENV"
          fi

      - name: Build Railway frontend image
        run: |
          docker build frontend \
            --file frontend/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=https://api.example.com \
            --tag $FRONTEND_IMAGE:$PRIMARY_TAG \
            --tag $FRONTEND_IMAGE:${{ github.sha }}

      - name: Push frontend image
        if: github.event_name != 'pull_request'
        run: |
          docker push $FRONTEND_IMAGE:$PRIMARY_TAG
          docker push $FRONTEND_IMAGE:${{ github.sha }}

  backend-image:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set image name
        run: |
          OWNER_LOWER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE=ghcr.io/$OWNER_LOWER/privateai-backend" >> "$GITHUB_ENV"

      - name: Set image tags
        run: |
          if [ "${{ github.ref_name }}" = "master" ]; then
            echo "PRIMARY_TAG=latest" >> "$GITHUB_ENV"
          else
            BRANCH_TAG="$(echo '${{ github.ref_name }}' | tr '/' '-')"
            echo "PRIMARY_TAG=$BRANCH_TAG" >> "$GITHUB_ENV"
          fi

      - name: Build Railway backend image
        run: |
          docker build backend \
            --file backend/Dockerfile \
            --tag $IMAGE:$PRIMARY_TAG \
            --tag $IMAGE:${{ github.sha }}

      - name: Push backend image
        if: github.event_name != 'pull_request'
        run: |
          docker push $IMAGE:$PRIMARY_TAG
          docker push $IMAGE:${{ github.sha }}
