name: Docker Image CI

on:
  workflow_dispatch:
  push:
    branches: ["master", "feat/github-actions-docker"]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write # REQUIRED for GHCR

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set image name
        run: |
          OWNER_LOWER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE=ghcr.io/$OWNER_LOWER/app" >> "$GITHUB_ENV"

      - name: Set image tags
        run: |
          if [ "${{ github.ref_name }}" = "master" ]; then
            echo "PRIMARY_TAG=latest" >> "$GITHUB_ENV"
          else
            BRANCH_TAG="$(echo '${{ github.ref_name }}' | tr '/' '-')"
            echo "PRIMARY_TAG=$BRANCH_TAG" >> "$GITHUB_ENV"
          fi

      - name: Build image
        run: |
          docker build . \
            --tag $IMAGE:$PRIMARY_TAG \
            --tag $IMAGE:${{ github.sha }}

      - name: Push image
        run: |
          docker push $IMAGE:$PRIMARY_TAG
          docker push $IMAGE:${{ github.sha }}
