# PrivateAI nginx reverse proxy
#
# Port 443  — main app  (frontend + backend API + WebSockets)
# Port 8443 — Open WebUI (no path-prefix needed, browser opens in iframe)
# Port 80   — redirect to HTTPS + Let's Encrypt challenge

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

events { worker_connections 1024; }

http {
    upstream app_backend  { server app:8000; }
    upstream app_frontend { server app:3000; }
    upstream open_webui   { server app:8080; }

    # ── HTTP: certbot challenge + redirect ─────────────────────────────
    server {
        listen 80;
        server_name _;

        # Let's Encrypt webroot challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS: main app ────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;  # Replace with your domain after certs are ready

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_session_cache   shared:SSL:10m;

        # Keep WebSocket connections alive for SSH terminal / provisioning
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;

        # ── Backend API, health, docs ─────────────────────────────────
        location ~ ^/(api|health|docs|redoc|openapi\.json) {
            proxy_pass         http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Frontend ──────────────────────────────────────────────────
        location / {
            proxy_pass         http://app_frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # ── HTTPS: Open WebUI (separate port so no path-prefix needed) ─────
    server {
        listen 8443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;

        location / {
            proxy_pass         http://open_webui;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
